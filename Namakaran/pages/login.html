<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ورود / عضویت</title>

    <link rel="stylesheet" href="../main.css" />
    <link rel="stylesheet" href="login-css/style.css" />
  </head>

  <body>
    <header class="header">
      <div class="logo">نماکاران به کار سبلان</div>

      <nav id="nav">
        <a href="example.html">نمونه کارها</a>
        <a href="about.html">درباره ما</a>
        <a href="../index.html">خانه</a>
      </nav>

      <div class="menu-btn" id="menuBtn">☰</div>
    </header>

    <main class="main">
      <div class="container">
        <div class="tabs">
          <button class="tab active" data-tab="login">ورود</button>
          <button class="tab" data-tab="register">عضویت</button>
        </div>

        <form class="form active" id="login">
          <h2>ورود</h2>

          <label>ایمیل</label>
          <input type="email" placeholder="example@gmail.com" required />

          <label>شماره تلفن</label>
          <input
            type="tel"
            placeholder="0912xxxxxxx"
            pattern="^0\d{10}$"
            required
          />

          <button type="submit">ورود</button>
        </form>

        <form class="form" id="register">
          <h2>عضویت</h2>

          <label>نام و نام خانوادگی</label>
          <input type="text" placeholder="رضا رضایی" required />

          <label>ایمیل</label>
          <input type="email" placeholder="example@gmail.com" required />

          <label>شماره تلفن</label>
          <input
            type="tel"
            placeholder="0912xxxxxxx"
            pattern="^0\d{10}$"
            required
          />

          <button type="submit">ایجاد حساب</button>
        </form>
      </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="login-css/js.js"></script>
  </body>
</html>
